services:
  - type: web
    name: rephase
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT --ws-max-size 536870912 --timeout-keep-alive 600"
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ORIGINSTAMP_API_KEY
        sync: false
      - key: ADMIN_FIXED_COSTS_CHF
        value: "0"
