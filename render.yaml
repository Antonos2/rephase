services:
  - type: web
    name: rephase
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ORIGINSTAMP_API_KEY
        sync: false
      - key: ADMIN_FIXED_COSTS_CHF
        value: "0"
